<html>
    <head>
        <title>Menú de Pacientes</title>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <style>
            body, html {
                margin: 0;
                padding: 0;
                width: 100%;
                height: 100%;
                overflow: hidden;
                display: flex;
                justify-content: center;
                align-items: center;
                font-family: Arial, sans-serif;
            }
            
            #menu {
                position: fixed;
                top: 0;
                left: 0;
                width: 100vw;
                height: 100vh;
                object-fit: cover;
                object-position: center;
                z-index: -1;
            }
            
            .menu-container {
                text-align: center;
                background-color: rgba(255, 255, 255, 0.2);
                backdrop-filter: blur(5px);
                padding: 30px;
                border-radius: 15px;
                box-shadow: 0 0 20px rgba(0, 0, 0, 0.3);
            }
            
            .menu-links {
                display: flex;
                flex-direction: column;
                align-items: center;
            }
            
            a {
                display: inline-block;
                margin: 10px;
                padding: 15px 30px;
                background-color: #f9c74f;
                color: #000;
                text-decoration: none;
                font-weight: bold;
                border-radius: 10px;
                transition: all 0.3s ease;
                width: 250px;
                text-align: center;
            }
            
            a:hover {
                background-color: #f9844a;
                color: white;
                transform: translateY(-3px);
                box-shadow: 0 5px 15px rgba(0, 0, 0, 0.2);
            }
            
            h1 {
                color: white;
                text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.5);
                margin-bottom: 30px;
            }
        </style>
    </head>
    <body>
        <video autoplay muted loop id="menu">
            <source src="paciDaoM.mp4" type="video/mp4">
            Tu navegador no soporta videos HTML5.
        </video>
        
        <div class="menu-container">
            <div class="menu-links">
                <a href="agregaPaciente.jsp">Nuevo Paciente</a>
                <a href="modifPa.jsp">Modificar Paciente</a>
                <a href="consultaPa.jsp">Consultar Paciente</a>
                <a href="buscaTodos.jsp">Consultar todos los Pacientes</a>
                <a href="eliminaPa.jsp">Eliminar pacientes</a>
                <a href="optoMenu.html">REGRESAR</a>
            </div>
        </div>
    </body>
</html>
