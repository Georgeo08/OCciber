
<html>
    <head>
        <title>TODO supply a title</title>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <style>
        body, html {
                margin: 0;
                padding: 0;
                width: 100%;
                height: 100%;
                overflow: hidden;
            }
            
            #ingreso {
                position: fixed;
                top: 0;
                left: 0;
                width: 100vw;
                height: 100vh;
                object-fit: cover;
                object-position: center;
                z-index: -1;
            }
            .boton{
                width: 100%;
                height: 100%;
                display: flex;        
                flex-direction: column;
                justify-content: center; 
                align-items: center;    
                gap: 20px;              
            }
            
            #op, #paciente {
                width: 150px;
                height: 40px;
            }
            
            </style>
            <script>
                function opto(){
                    window.location.href="passOp.html";
                }
                function paciente(){
                    window.location.href="passPaciente.html";
                }
                setTimeout(()=>{
                    document.getElementById("op").hidden=false;
                },2000);
                setTimeout(()=>{
                    document.getElementById("paciente").hidden=false;
                },2000);
            </script>
    </head>
    <body>
        <video autoplay muted id="ingreso">
            <source src="ingreso.mp4" type="video/mp4">
        </video>
        <div class="boton">
            <input type="button" id="op" value="OPTOMETRISTA" onclick="opto()" hidden>
            <input type="button" id="paciente" value="PACIENTE" onclick="paciente()" hidden>
        </div>
    </body>
</html>
