<html>
    <head>
        <title>Menú Principal</title>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <style>
            body, html {
                margin: 0;
                padding: 0;
                width: 100%;
                height: 100%;
                overflow: hidden;
                display: flex;
                justify-content: center;
                align-items: center;
            }
            
            #opMenu {
                position: fixed;
                top: 0;
                left: 0;
                width: 100vw;
                height: 100vh;
                object-fit: cover;
                object-position: center;
                z-index: -1;
            }
            
            .menu-container {
                text-align: center;
            }
            
            a {
                display: inline-block;
                margin: 20px;
                padding: 15px 30px;
                background-color: #f9c74f;
                color: #000;
                text-decoration: none;
                font-weight: bold;
                border-radius: 10px;
                transition: background-color 0.3s ease;
                width: 250px;
            }
            
            a:hover {
                background-color: #f9844a;
                color: white;
            }
        </style>
    </head>
    <body>
        <video autoplay loop muted id="opMenu">
            <source src="opMenu.mp4" type="video/mp4">
        </video>
        <div class="menu-container">
            <a href="paciDaoMenu.html"><b>Administrar datos de Pacientes</b></a><br>

            <a href="histoMenu.html">Administrar recetas/historial médico</a>

        </div>
    </body>
</html>
